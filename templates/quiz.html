{% extends "base.html" %}
{% block content %}
<nav class="d-flex align-items-center mb-4">
  <a href="{{ url_for('home') }}" class="text-decoration-none d-flex align-items-center">
    <span class="me-2" style="width:36px;height:36px"></span>
  </a>
  <span class="ms-auto text-muted">Question {{ n }} of {{ total }}</span>
</nav>

<div class="dots justify-content-center mb-4">
  {% for i in range(1, total+1) %}
    <div class="dot{% if i==n %} on{% endif %}"></div>
  {% endfor %}
</div>

<div class="card shadow-sm">
  <div class="card-body p-4">
    <h3 class="fw-semibold mb-3">{{ question.q }}</h3>
    <form method="POST" action="{{ url_for('quiz', n=n) }}">
      <textarea name="answer" class="form-control mb-3" rows="6" placeholder="Your answer..." required></textarea>
      <div class="d-flex justify-content-between">
        <a href="{{ url_for('home') }}" class="btn btn-outline-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">
          {% if n < total %}Next question &rarr;{% else %}See results &rarr;{% endif %}
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}{% endblock %}
